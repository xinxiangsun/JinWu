name: Publish jinwu + jinwurs

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'         # e.g. v0.0.30
  workflow_dispatch:

jobs:
  # ── Python (jinwu) ─────────────────────────────────
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build && python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  # ── Rust (jinwurs) ─────────────────────────────────
  build-rust:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']
        # ubuntu-latest  → manylinux_2_17（兼容 CentOS 7+, Debian 10+, Ubuntu 20.04+）
        # macos-latest    → Apple Silicon arm64（自动跟踪最新版本）
        # Intel macOS (macos-13) 已移除，Apple Silicon 是主流，Intel 用户需从源码编译
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: PyO3/maturin-action@v1
        with:
          maturin-version: latest
          command: build
          args: --release --out dist --manifest-path src/jinwurs/Cargo.toml
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: rust-wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/

  # ── Publish + Release ──────────────────────────────
  publish:
    needs: [build-python, build-rust]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: artifacts/

      - name: Collect all wheels
        run: |
          mkdir -p dist
          find artifacts -name '*.whl' -o -name '*.tar.gz' | xargs cp -t dist/
          echo "=== All packages ==="
          ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
